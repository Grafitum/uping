<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="form-box" style="height: 350px; top: 0%;">
        <form class="form">
            <span class="title">Bem-vindo de volta</span>
            <span class="subtitle">Insira as credenciais de sua conta.</span>
            <div class="form-container">
                <input type="text" class="input" placeholder="Nome de usuário">
                <input type="password" class="input" placeholder="Senha"> 
            </div>
            <button>Entrar</button>
            <div class="form-section">

                <p>Ainda não cadastrado? <a href="login.html">Criar conta</a> </p>
            </div>
        </form>
    </div>  
</body>
</html>
