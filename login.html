<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="form-box">
        <form class="form">
            <span class="title">Cadastre-se</span>
            <span class="subtitle">Junte-se aos nossos vários micro-empreendedores</span>
            <div class="form-container">
                <input type="text" class="input" placeholder="Nome de usuário">
                <input type="email" class="input" placeholder="Email">
                <input type="password" class="input" placeholder="Senha"> 
                <input type="password2" class="input" placeholder="Confirmar senha">     
            </div>
            <button>Cadastrar</button>
            <div class="form-section">
                <p>Já está cadastrado? <a href="input.html">Entre</a> </p>
            </div>
        </form>
    </div>  
</body>
</html>
