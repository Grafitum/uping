<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uping</title>
    <link href="" rel="stylesheet">
    <style>
        /* Estilos existentes */
    </style>
</head>
<body>
    <div class="background-image"></div>
    <div class="chat-container">
        <div class="chat-header">
            <div>
                <img src="imagem/logo2.png"  class="logo">
                <h2>Tire sua dúvida </h2>
            </div>

            <button class="back-button"  > <a href="index.html"> Voltar </a></button>
        </div>

        <section class="chat-section">
            <div class="message bot-message">Digite sua dúvida , e melhore seu comércio!</div>
            <div class="chat-box" id="chat-box"></div>
            <input type="text" id="user-input" placeholder="Digite oi para teste..." />
            <button id="send-button">Enviar</button>
        </section>
    </div>

    <script>

        function getGreeting() {
            const userInput = document.getElementById('user-input').value.trim().toLowerCase();
            const chatBox = document.getElementById('chat-box');

            // Limpa as mensagens anteriores
            chatBox.innerHTML = '';

            // Exibe a mensagem de "Aguarde" e depois os dados após 2 segundos
            chatBox.innerHTML += `<div class="message bot-message">Aguarde enquanto processamos sua mensagem...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                if (userInput === 'olá' || userInput === 'oi'    ) {
                    chatBox.innerHTML += `<div class="message bot-message">Olá! Como você está? nossas vendas sao 19,90</div>`;
                } else {
                    chatBox.innerHTML += `<div class="message bot-message">Desculpe, não entendi. Tente novamente.</div>`;
                }

                chatBox.scrollTop = chatBox.scrollHeight;
                document.getElementById('user-input').value = '';
            }, 2000); // 2 segundos de atraso
        }

        document.getElementById('send-button').addEventListener('click', getGreeting);
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                getGreeting();
            }
        })
    </script>
    

    <style>
          * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("imagem/male.jpg");
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            z-index: 1;
        }

        .chat-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            width: 500px;
            max-width: 90%;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        .chat-header {
            background-color: #000000; /* Verde */
            color: white;
            padding: 15px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .chat-header .logo {
            height: 40px;
            margin-right: 10px;
            border-radius: 50%;
        }

        .chat-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .back-button {
            background-color: #ffffff; /* Amarelo */
            color: #000000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            transition: background-color 0.3s, transform 0.2s;
        }

        .back-button:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }

        .chat-box {
            padding: 15px;
            height: 350px;
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 0 0 10px 10px;
            font-size: 16px;
            line-height: 1.5;
            background-color: #fafafa;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .message {
            margin: 15px 0;
            padding: 10px;
            border-radius: 5px;
        }

        .bot-message {
            background-color: #e8f5e9; /* Verde claro */
            text-align: left;
        }

        .user-message {
            background-color: #000000; /* Verde */
            color: white;
            text-align: right;
        }

        input[type="text"] {
            width: calc(100% - 100px);
            padding: 12px;
            border: 1px solid #fffcfc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            background-color: #000000; /* Verde */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #000000; /* Verde escuro */
        }
    </style>
</body>
</html>
